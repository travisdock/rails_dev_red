<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blastoff Rails: The Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Tiny5&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    @media (pointer: coarse) {
      body {
        align-items: flex-start;
        padding-top: 60px;
      }
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
    }
    /* Mobile controls - only shown on touch devices */
    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      z-index: 1000;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #mobile-controls .dpad {
      position: absolute;
      left: 24px;
      bottom: 56px;
      width: 176px;
      height: 176px;
    }
    #mobile-controls .buttons {
      position: absolute;
      right: 24px;
      bottom: 68px;
    }
    #mobile-controls button {
      pointer-events: auto;
      border: none;
      border-radius: 50%;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      color: #fff;
      opacity: 0.55;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #mobile-controls button:active, #mobile-controls button.pressed {
      opacity: 0.85;
    }
    .dpad button {
      position: absolute;
      width: 58px;
      height: 58px;
      background: #444;
    }
    .dpad .up    { top: 0; left: 59px; border-radius: 8px 8px 0 0; }
    .dpad .down  { bottom: 0; left: 59px; border-radius: 0 0 8px 8px; }
    .dpad .left  { top: 59px; left: 0; border-radius: 8px 0 0 8px; }
    .dpad .right { top: 59px; right: 0; border-radius: 0 8px 8px 0; }
    .dpad .center { display: none; }
    .btn-a {
      width: 68px;
      height: 68px;
      background: #2a7d3f;
      margin-bottom: 14px;
    }
    .btn-b {
      width: 68px;
      height: 68px;
      background: #7d2a2a;
    }
    #mute-btn {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 10000;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      font-size: 20px;
      width: 36px;
      height: 36px;
      line-height: 36px;
      padding: 0;
      text-align: center;
      cursor: pointer;
      opacity: 0.6;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #mute-btn:hover, #mute-btn:active { opacity: 0.9; }
    @media (pointer: coarse) {
      #mobile-controls { display: block; }
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="src/constants.js"></script>
  <script src="src/utils/math.js"></script>
  <script src="src/utils/grid.js"></script>
  <script src="src/utils/typeEffectiveness.js"></script>
  <script src="src/entities/GemInstance.js"></script>
  <script src="src/systems/SaveManager.js"></script>
  <script src="src/systems/ProgressManager.js"></script>
  <script src="src/systems/PartyManager.js"></script>

  <script src="src/systems/DialogManager.js"></script>
  <script src="src/systems/EncounterManager.js"></script>
  <script src="src/systems/BattleManager.js"></script>
  <script src="src/ui/TextBox.js"></script>
  <script src="src/ui/MenuBox.js"></script>
  <script src="src/ui/BattleHUD.js"></script>
  <script src="src/ui/TransitionFX.js"></script>
  <script src="src/entities/Player.js"></script>
  <script src="src/entities/NPC.js"></script>
  <script src="src/entities/Trainer.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/PreloadScene.js"></script>
  <script src="src/scenes/TitleScene.js"></script>
  <script src="src/scenes/OverworldScene.js"></script>
  <script src="src/scenes/BattleScene.js"></script>
  <script src="src/scenes/BattleUIScene.js"></script>
  <script src="src/scenes/DialogScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/PartyScene.js"></script>

  <script src="src/scenes/HealScene.js"></script>
  <script src="src/main.js"></script>
  <script>
  let isMuted = true;
  let silentAudio = null;

  function toggleMute() {
    if (!window.game) return;
    isMuted = !isMuted;
    window.game.sound.mute = isMuted;

    if (!isMuted) {
      // Resume Web Audio context
      if (window.game.sound.context && window.game.sound.context.state === 'suspended') {
        window.game.sound.context.resume();
      }
      // Play silent <audio> element to force iOS media channel (bypasses silent switch)
      if (!silentAudio) {
        silentAudio = new Audio('assets/audio/silence.wav');
        silentAudio.loop = true;
      }
      silentAudio.play().catch(() => {});
    } else {
      if (silentAudio) {
        silentAudio.pause();
      }
    }
    document.getElementById('mute-btn').textContent = isMuted ? '\u{1F507}' : '\u{1F50A}';
  }
  </script>

  <div id="mobile-controls">
    <div class="dpad">
      <button class="up" data-key="ArrowUp">&#9650;</button>
      <button class="down" data-key="ArrowDown">&#9660;</button>
      <button class="left" data-key="ArrowLeft">&#9664;</button>
      <button class="right" data-key="ArrowRight">&#9654;</button>
      <div class="center"></div>
    </div>
    <div class="buttons">
      <button class="btn-a" data-key="z">A</button><br>
      <button class="btn-b" data-key="x">B</button>
    </div>
  </div>
  <button id="mute-btn" onclick="toggleMute()">&#x1F507;</button>

  <script>
  (function() {
    const buttons = document.querySelectorAll('#mobile-controls button[data-key]');
    const canvas = () => document.querySelector('canvas');

    const KEY_CODES = {
      ArrowUp: 38, ArrowDown: 40, ArrowLeft: 37, ArrowRight: 39,
      z: 90, x: 88
    };

    function fireKey(type, key) {
      window.dispatchEvent(new KeyboardEvent(type, {
        key: key,
        code: key.length === 1 ? 'Key' + key.toUpperCase() : key,
        keyCode: KEY_CODES[key] || 0,
        which: KEY_CODES[key] || 0,
        bubbles: true, cancelable: true
      }));
    }

    buttons.forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        fireKey('keydown', key);
      }, { passive: false });

      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        btn.classList.remove('pressed');
        fireKey('keyup', key);
      }, { passive: false });

      btn.addEventListener('touchcancel', (e) => {
        btn.classList.remove('pressed');
        fireKey('keyup', key);
      });
    });
  })();
  </script>
</body>
</html>
